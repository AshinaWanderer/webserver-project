user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    upstream backend {
        server 172.28.0.11:80;
        server 172.28.0.12:80;
        server 172.28.0.13:80;
    }

    # Redirect plain HTTP to HTTPS
    server {
        listen 80;
        server_name webserver.ashinalabs.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name webserver.ashinalabs.com;

        ssl_certificate     /etc/letsencrypt/live/webserver.ashinalabs.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/webserver.ashinalabs.com/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        location / {
            proxy_pass              http://backend;
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $remote_addr;
            proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto https;
            proxy_connect_timeout   5s;
            proxy_read_timeout      10s;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
