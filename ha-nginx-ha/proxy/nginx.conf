events {
    worker_connections 1024;
}

http {
    upstream backend {
        server 172.28.0.11:80;
        server 172.28.0.12:80;
        server 172.28.0.13:80;
    }

    # Redirect plain HTTP to HTTPS
    server {
        listen 80;
        server_name webserver.ashinalabs.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name webserver.ashinalabs.com;

        ssl_certificate     /etc/letsencrypt/live/webserver.ashinalabs.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/webserver.ashinalabs.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }
    }
}
