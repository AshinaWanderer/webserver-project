# Keepalived config for VM2 (BACKUP)
# Install to: /etc/keepalived/keepalived.conf on VM2
#
# Replace:
#   VM2_PUBLIC_IP  — VM2's own public IP
#   VM1_PUBLIC_IP  — VM1's public IP (used for unicast heartbeats)

vrrp_script chk_proxy {
    script "docker inspect -f '{{.State.Status}}' proxy 2>/dev/null | grep -q running"
    interval 5
    fall    2
    rise    2
    weight  -50
}

vrrp_instance VI_1 {
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 100
    advert_int 1

    unicast_src_ip VM2_PUBLIC_IP
    unicast_peer {
        VM1_PUBLIC_IP
    }

    authentication {
        auth_type PASS
        auth_pass geheim
    }

    virtual_ipaddress {
        178.104.54.92/32 dev eth0
    }

    track_script {
        chk_proxy
    }

    notify /etc/keepalived/notify.sh
}
