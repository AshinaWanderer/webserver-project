# Keepalived config for VM1 (MASTER)
# Install to: /etc/keepalived/keepalived.conf on VM1
#
# Replace:
#   VM1_PUBLIC_IP  — VM1's own public IP
#   VM2_PUBLIC_IP  — VM2's public IP (used for unicast heartbeats)

vrrp_script chk_proxy {
    script "docker inspect -f '{{.State.Status}}' proxy 2>/dev/null | grep -q running"
    interval 5    # check every 5s
    fall    2     # 2 failures → unhealthy
    rise    2     # 2 successes → healthy again
    weight  -50   # drop priority by 50 if proxy is down → triggers failover
}

vrrp_instance VI_1 {
    state MASTER
    interface eth0
    virtual_router_id 51
    priority 101
    advert_int 1

    # Unicast heartbeats (required on most cloud providers — multicast not supported)
    unicast_src_ip VM1_PUBLIC_IP
    unicast_peer {
        VM2_PUBLIC_IP
    }

    authentication {
        auth_type PASS
        auth_pass geheim
    }

    # keepalived automatically adds/removes this IP on eth0 when state changes
    virtual_ipaddress {
        178.104.54.92/32 dev eth0
    }

    track_script {
        chk_proxy
    }

    # Called on every state transition (MASTER/BACKUP/FAULT)
    notify /etc/keepalived/notify.sh
}
