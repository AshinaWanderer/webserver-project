version: "3.8"
services:
  web1:
    image: nginx:alpine
    container_name: web1
    ports:
      - "8080:80"
    volumes:
      - ./web1/index.html:/usr/share/nginx/html/index.html:ro
    restart: unless-stopped

  web2:
    image: nginx:alpine
    container_name: web2
    ports:
      - "8081:80"
    volumes:
      - ./web2/index.html:/usr/share/nginx/html/index.html:ro
    restart: unless-stopped

  web3:
    image: nginx:alpine
    container_name: web3
    ports:
      - "8082:80"
    volumes:
      - ./web3/index.html:/usr/share/nginx/html/index.html:ro
    restart: unless-stopped

  proxy-master:
    build: ./proxy
    container_name: proxy-master
    hostname: proxy-master
    network_mode: host
    privileged: true
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

  proxy-backup:
    build: ./proxy
    container_name: proxy-backup
    hostname: proxy-backup
    network_mode: host
    privileged: true
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped