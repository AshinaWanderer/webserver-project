services:
  # --- Backend web servers ---
  web1:
    image: nginx:alpine
    container_name: web1
    volumes:
      - ./web1/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      ha:
        ipv4_address: 172.28.0.11

  web2:
    image: nginx:alpine
    container_name: web2
    volumes:
      - ./web2/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      ha:
        ipv4_address: 172.28.0.12

  web3:
    image: nginx:alpine
    container_name: web3
    volumes:
      - ./web3/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      ha:
        ipv4_address: 172.28.0.13

  # --- Reverse proxy ---
  # Single proxy with TLS. Docker restarts it automatically if it crashes.
  proxy:
    build: ./proxy
    container_name: proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      ha:
        ipv4_address: 172.28.0.2
    depends_on:
      - web1
      - web2
      - web3
    restart: unless-stopped

networks:
  ha:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
