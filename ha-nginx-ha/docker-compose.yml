services:
  web1:
    image: nginx:alpine
    container_name: web1
    volumes:
      - ./web1/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - ha
    restart: unless-stopped

  web2:
    image: nginx:alpine
    container_name: web2
    volumes:
      - ./web2/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - ha
    restart: unless-stopped

  web3:
    image: nginx:alpine
    container_name: web3
    volumes:
      - ./web3/index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - ha
    restart: unless-stopped

  proxy-master:
    image: nginx:alpine
    container_name: proxy-master
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - web1
      - web2
      - web3
    networks:
      - ha
    restart: unless-stopped

  proxy-backup:
    image: nginx:alpine
    container_name: proxy-backup
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:80"
    depends_on:
      - web1
      - web2
      - web3
    networks:
      - ha
    restart: unless-stopped

networks:
  ha:
    driver: bridge
